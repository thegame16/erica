<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>I'm Sorry</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: 'Poppins', sans-serif;
        }

        .card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ff4b5c;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #ff4b5c;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>I'm Sorry</h1>
    <p>Please forgive me ❤️</p>
    <button id="forgiveBtn">Forgive Me</button>
</div>

<script>
    document.getElementById("forgiveBtn").addEventListener("click", function() {
        alert("Thank you for forgiving me ❤️");
    });
</script>

</body>
</html>
