<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .card {
        background: white;
        padding: 50px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        animation: fadeIn 1.5s ease;
    }

    h1 {
        font-size: 3em;
        color: #ff4b5c;
        margin-bottom: 20px;
    }

    p {
        font-size: 1.2em;
        color: #555;
        margin-bottom: 30px;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: #ff4b5c;
        color: white;
        font-size: 1em;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #e63e4d;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<div class="card">
    <h1>I'm Sorry BABY💔</h1>
    <p>
        I didn’t mean to hurt you or annoy you. 
        You mean so much to me.
    </p>

    <button onclick="goToPage()">Forgive Me 💖</button>
</div>

<script>
function goToPage() {
    window.location.href = "forgive.html";
}
</script>

</body>
</html>
